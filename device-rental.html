<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단말기 대여/반납 현황 관리</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI','Malgun Gothic',sans-serif; background:#f0f2f5; color:#222; }

header { background:#1a73e8; color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 6px rgba(0,0,0,.2); }
header h1 { font-size:18px; font-weight:600; }
.header-actions { display:flex; gap:8px; }

.btn { padding:7px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:opacity .15s,transform .1s; }
.btn:hover { opacity:.85; } .btn:active { transform:scale(.97); }
.btn-primary  { background:#1a73e8; color:#fff; }
.btn-white    { background:#fff; color:#1a73e8; border:1px solid #1a73e8; }
.btn-rent     { background:#1a73e8; color:#fff; font-size:12px; padding:5px 10px; min-width:50px; }
.btn-return   { background:#34a853; color:#fff; font-size:12px; padding:5px 10px; min-width:50px; }
.btn-qr       { background:#7c3aed; color:#fff; font-size:12px; padding:5px 8px; }
.btn-purple   { background:#7c3aed; color:#fff; }
.btn-cancel   { background:#f1f3f4; color:#444; }
.btn-icon     { background:none; border:none; cursor:pointer; font-size:14px; padding:3px 5px; border-radius:4px; }
.btn-icon:hover { background:#e8e8e8; }

.container { padding:20px 24px; }

.summary { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.summary-card { background:#fff; border-radius:10px; padding:12px 16px; box-shadow:0 1px 4px rgba(0,0,0,.1); flex:1; min-width:90px; text-align:center; }
.summary-card .lbl { font-size:11px; color:#666; margin-bottom:4px; }
.summary-card .val { font-size:22px; font-weight:700; }
.sc-total   .val { color:#444; }
.sc-avail   .val { color:#34a853; }
.sc-rented  .val { color:#1a73e8; }
.sc-broken  .val { color:#f57c00; }
.sc-as      .val { color:#7c3aed; }
.sc-discard .val { color:#999; }

.toolbar { display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
.search-box { padding:7px 12px; border:1px solid #ccc; border-radius:6px; font-size:13px; width:220px; outline:none; }
.search-box:focus { border-color:#1a73e8; }
select.filter-select { padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; background:#fff; cursor:pointer; outline:none; }

.table-wrap { background:#fff; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.1); overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:1800px; }
thead tr { background:#f8f9fa; }
thead th { padding:11px 10px; text-align:left; font-weight:600; color:#555; border-bottom:1px solid #e0e0e0; white-space:nowrap; cursor:pointer; user-select:none; }
thead th:hover { background:#eef2fb; }
thead th.no-sort { cursor:default; } thead th.no-sort:hover { background:#f8f9fa; }
thead th .si { margin-left:3px; color:#bbb; font-size:10px; }
thead th.sorted .si { color:#1a73e8; }
tbody tr { border-bottom:1px solid #f0f0f0; transition:background .1s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:#f7f9ff; }
td { padding:9px 10px; vertical-align:middle; }
.trunc { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; max-width:150px; }

.badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
.badge-avail   { background:#e6f4ea; color:#1e7e34; }
.badge-rented  { background:#e8f0fe; color:#1967d2; }
.badge-broken  { background:#fff3e0; color:#e65100; }
.badge-as      { background:#f3e8ff; color:#6a1b9a; }
.badge-discard { background:#f1f3f4; color:#777; }

.os-badge { display:inline-block; padding:1px 7px; border-radius:4px; font-size:11px; font-weight:600; }
.os-android { background:#e8f5e9; color:#2e7d32; }
.os-ios     { background:#e3f2fd; color:#1565c0; }
.os-other   { background:#f3e5f5; color:#6a1b9a; }

.actions { display:flex; gap:4px; align-items:center; flex-wrap:nowrap; }
.empty-row td { text-align:center; color:#aaa; padding:48px; font-size:14px; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:14px; width:480px; max-width:96vw; max-height:92vh; overflow-y:auto; padding:26px; box-shadow:0 8px 32px rgba(0,0,0,.2); animation:fadeIn .18s ease; }
.modal.modal-qr { width:500px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
.modal h2 { font-size:16px; margin-bottom:16px; color:#333; }
.sec-label { font-size:11px; font-weight:700; color:#1a73e8; letter-spacing:.5px; text-transform:uppercase; margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid #e8f0fe; }
.form-group { margin-bottom:11px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:#555; margin-bottom:4px; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; outline:none; font-family:inherit; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:#1a73e8; }
.form-group textarea { resize:vertical; min-height:56px; }
.form-row { display:flex; gap:10px; }
.form-row .form-group { flex:1; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }

.rent-info { background:#f8f9fa; border-radius:8px; padding:12px; margin-bottom:14px; font-size:13px; }
.rent-info .ri-row { display:flex; gap:8px; margin-bottom:5px; }
.rent-info .ri-row:last-child { margin-bottom:0; }
.rent-info .ri-label { color:#888; min-width:58px; font-size:12px; }
.rent-info .ri-value { font-weight:600; }

/* QR modal */
.qr-modal-body { display:flex; gap:18px; align-items:flex-start; }
#qr-canvas-container { flex-shrink:0; width:180px; height:180px; display:flex; align-items:center; justify-content:center; border:2px solid #e0e0e0; border-radius:10px; background:#fff; overflow:hidden; }
#qr-canvas-container canvas,#qr-canvas-container img { display:block; }
.qr-device-info { flex:1; font-size:12.5px; }
.qr-device-info .qi-title { font-size:14px; font-weight:700; color:#222; margin-bottom:10px; }
.qr-device-info .qi-row { display:flex; gap:6px; margin-bottom:6px; }
.qr-device-info .qi-label { color:#888; min-width:64px; font-size:12px; }
.qr-device-info .qi-value { font-weight:600; color:#333; }
.qr-modal-actions { display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:14px; border-top:1px solid #f0f0f0; }
.qr-modal-actions .left-btns { display:flex; gap:8px; }

#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#323232; color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; box-shadow:0 4px 12px rgba(0,0,0,.25); opacity:0; transition:opacity .3s; pointer-events:none; z-index:2000; white-space:nowrap; }
#toast.show { opacity:1; }

#print-area { display:none; }
@media print {
  body > *:not(#print-area) { display:none !important; }
  #print-area { display:block !important; padding:10mm; }
  .print-title { font-size:14pt; font-weight:bold; margin-bottom:5mm; border-bottom:1px solid #ccc; padding-bottom:3mm; font-family:'Malgun Gothic',sans-serif; }
  .print-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5mm; }
  .print-grid.single { grid-template-columns:200px; justify-content:center; margin-top:10mm; }
  .qr-card { border:1px solid #bbb; border-radius:6px; padding:4mm; text-align:center; break-inside:avoid; page-break-inside:avoid; font-family:'Malgun Gothic',sans-serif; }
  .qr-card img { width:100%; max-width:140px; height:auto; display:block; margin:0 auto; }
  .print-grid.single .qr-card img { max-width:180px; }
  .qr-card .qc-name { font-size:10pt; font-weight:700; margin-top:2mm; }
  .qr-card .qc-sub  { font-size:7.5pt; color:#555; margin-top:1mm; }
  .qr-card .qc-status { display:inline-block; font-size:7.5pt; font-weight:700; margin-top:1.5mm; padding:1px 6px; border-radius:10px; }
  .st-avail   { background:#e6f4ea; color:#1e7e34; }
  .st-rented  { background:#e8f0fe; color:#1967d2; }
  .st-broken  { background:#fff3e0; color:#e65100; }
  .st-as      { background:#f3e8ff; color:#6a1b9a; }
  .st-discard { background:#f1f3f4; color:#777; }
  .qr-card .qc-renter { font-size:7pt; color:#444; margin-top:1mm; }
}
</style>
</head>
<body>

<header>
  <h1>📱 단말기 대여/반납 현황 관리</h1>
  <div class="header-actions">
    <button class="btn btn-white" onclick="printAllQR()">🖨️ 전체 QR</button>
    <button class="btn btn-white" onclick="openAddModal()">+ 단말기 추가</button>
  </div>
</header>

<div class="container">
  <div class="summary">
    <div class="summary-card sc-total">  <div class="lbl">전체</div><div class="val" id="sum-total">0</div></div>
    <div class="summary-card sc-avail">  <div class="lbl">보유</div><div class="val" id="sum-avail">0</div></div>
    <div class="summary-card sc-rented"> <div class="lbl">대여</div><div class="val" id="sum-rented">0</div></div>
    <div class="summary-card sc-broken"> <div class="lbl">고장</div><div class="val" id="sum-broken">0</div></div>
    <div class="summary-card sc-as">     <div class="lbl">AS</div><div class="val" id="sum-as">0</div></div>
    <div class="summary-card sc-discard"><div class="lbl">폐기</div><div class="val" id="sum-discard">0</div></div>
  </div>

  <div class="toolbar">
    <input class="search-box" type="text" id="search-input" placeholder="🔍 기기명 / 자산번호 / 대여자 검색" oninput="renderTable()">
    <select class="filter-select" id="filter-os" onchange="renderTable()">
      <option value="">전체 OS</option>
      <option value="Android">Android</option>
      <option value="iOS">iOS</option>
      <option value="기타">기타</option>
    </select>
    <select class="filter-select" id="filter-status" onchange="renderTable()">
      <option value="">전체 상태</option>
      <option value="보유">보유</option>
      <option value="대여">대여</option>
      <option value="고장">고장</option>
      <option value="AS">AS</option>
      <option value="폐기">폐기</option>
    </select>
    <label class="btn btn-white" style="cursor:pointer;" title="엑셀 파일 가져오기">
      📥 엑셀 가져오기
      <input type="file" id="excel-input" accept=".xlsx,.xls" style="display:none" onchange="handleExcelFile(this)">
    </label>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('assetId')">자산번호 <span class="si">▲▼</span></th>
        <th onclick="sortBy('name')">기기명 <span class="si">▲▼</span></th>
        <th onclick="sortBy('model')">모델번호 <span class="si">▲▼</span></th>
        <th onclick="sortBy('os')">OS <span class="si">▲▼</span></th>
        <th onclick="sortBy('version')">버전 <span class="si">▲▼</span></th>
        <th onclick="sortBy('serial')">시리얼번호 <span class="si">▲▼</span></th>
        <th onclick="sortBy('resolution')">해상도 <span class="si">▲▼</span></th>
        <th onclick="sortBy('ram')">RAM <span class="si">▲▼</span></th>
        <th onclick="sortBy('chipset')">칩셋 <span class="si">▲▼</span></th>
        <th onclick="sortBy('status')">상태 <span class="si">▲▼</span></th>
        <th onclick="sortBy('location')">위치 <span class="si">▲▼</span></th>
        <th onclick="sortBy('renter')">대여자 <span class="si">▲▼</span></th>
        <th onclick="sortBy('rentDate')">대여일 <span class="si">▲▼</span></th>
        <th onclick="sortBy('returnDate')">반납일 <span class="si">▲▼</span></th>
        <th onclick="sortBy('notes')">비고 <span class="si">▲▼</span></th>
        <th class="no-sort">관리</th>
      </tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- 추가/수정 Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="add-modal-title">단말기 추가</h2>
    <div class="sec-label">기본 정보</div>
    <div class="form-row">
      <div class="form-group"><label>자산번호</label><input type="text" id="f-assetId" placeholder="Needs_001"></div>
      <div class="form-group"><label>기기명 *</label><input type="text" id="f-name" placeholder="Galaxy S24"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>모델번호</label><input type="text" id="f-model" placeholder="SM-S921B"></div>
      <div class="form-group"><label>시리얼번호</label><input type="text" id="f-serial"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>OS *</label>
        <select id="f-os"><option value="Android">Android</option><option value="iOS">iOS</option><option value="기타">기타</option></select>
      </div>
      <div class="form-group"><label>버전 *</label><input type="text" id="f-version" placeholder="14.0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>해상도</label><input type="text" id="f-resolution" placeholder="2340×1080"></div>
      <div class="form-group"><label>RAM</label><input type="text" id="f-ram" placeholder="8GB"></div>
    </div>
    <div class="form-group"><label>칩셋</label><input type="text" id="f-chipset"></div>
    <div class="sec-label">상태 정보</div>
    <div class="form-row">
      <div class="form-group"><label>상태 *</label>
        <select id="f-status" onchange="toggleRentFields()">
          <option value="보유">보유</option><option value="대여">대여</option>
          <option value="고장">고장</option><option value="AS">AS</option><option value="폐기">폐기</option>
        </select>
      </div>
      <div class="form-group"><label>위치</label><input type="text" id="f-location" placeholder="서랍 보관, JK개발실 등"></div>
    </div>
    <div id="rent-fields">
      <div class="form-row">
        <div class="form-group"><label>대여자</label><input type="text" id="f-renter"></div>
        <div class="form-group"><label>대여일</label><input type="date" id="f-rentDate"></div>
      </div>
      <div class="form-group"><label>반납 예정일</label><input type="date" id="f-returnDate"></div>
    </div>
    <div class="form-group"><label>비고</label><textarea id="f-notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('add-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveDevice()">저장</button>
    </div>
  </div>
</div>

<!-- 대여 Modal -->
<div class="modal-overlay" id="rent-modal">
  <div class="modal">
    <h2>대여 처리</h2>
    <div class="rent-info" id="rent-info-box"></div>
    <div class="form-group"><label>대여자 이름 *</label><input type="text" id="rf-renter" placeholder="이름"></div>
    <div class="form-group"><label>위치 (반출 장소)</label><input type="text" id="rf-location" placeholder="JK개발실, 인사팀 등"></div>
    <div class="form-row">
      <div class="form-group"><label>대여일 *</label><input type="date" id="rf-rentDate"></div>
      <div class="form-group"><label>반납 예정일</label><input type="date" id="rf-returnDate"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('rent-modal')">취소</button>
      <button class="btn btn-rent" onclick="confirmRent()">대여 확정</button>
    </div>
  </div>
</div>

<!-- 반납 Modal -->
<div class="modal-overlay" id="return-modal">
  <div class="modal">
    <h2>반납 처리</h2>
    <div class="rent-info" id="return-info-box"></div>
    <div class="form-group"><label>반납일 *</label><input type="date" id="ret-date"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('return-modal')">취소</button>
      <button class="btn btn-return" onclick="confirmReturn()">반납 확정</button>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal modal-qr">
    <h2>QR 코드</h2>
    <div class="qr-modal-body">
      <div id="qr-canvas-container"></div>
      <div class="qr-device-info">
        <div class="qi-title" id="qr-device-name"></div>
        <div class="qi-row"><span class="qi-label">자산번호</span><span class="qi-value" id="qr-assetId"></span></div>
        <div class="qi-row"><span class="qi-label">모델번호</span><span class="qi-value" id="qr-model"></span></div>
        <div class="qi-row"><span class="qi-label">OS / 버전</span><span class="qi-value" id="qr-info-os"></span></div>
        <div class="qi-row"><span class="qi-label">상태</span><span class="qi-value" id="qr-info-status"></span></div>
        <div class="qi-row"><span class="qi-label">대여자</span><span class="qi-value" id="qr-info-renter"></span></div>
        <div class="qi-row"><span class="qi-label">위치</span><span class="qi-value" id="qr-info-location"></span></div>
        <div class="qi-row"><span class="qi-label">대여일</span><span class="qi-value" id="qr-info-rentdate"></span></div>
      </div>
    </div>
    <div class="qr-modal-actions">
      <div class="left-btns">
        <button class="btn btn-purple" onclick="downloadQR()">⬇ PNG 저장</button>
        <button class="btn btn-purple" onclick="printSingleQR()">🖨️ 인쇄</button>
      </div>
      <button class="btn btn-cancel" onclick="closeModal('qr-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- 엑셀 가져오기 미리보기 Modal -->
<div class="modal-overlay" id="import-modal">
  <div class="modal" style="width:700px;max-width:98vw;">
    <h2>엑셀 가져오기 미리보기</h2>
    <div id="import-summary" style="font-size:13px;color:#555;margin-bottom:12px;"></div>
    <div style="overflow-x:auto;max-height:400px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px;">
      <table id="import-preview-table" style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px;">
        <thead id="import-preview-head" style="background:#f8f9fa;position:sticky;top:0;"></thead>
        <tbody id="import-preview-body"></tbody>
      </table>
    </div>
    <div style="margin-top:12px;font-size:12px;color:#888;">
      ※ 기존 데이터를 모두 교체합니다. 추가(merge)하려면 <strong>병합 추가</strong>를 선택하세요.
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('import-modal')">취소</button>
      <button class="btn btn-white"  onclick="confirmImport(true)">병합 추가</button>
      <button class="btn btn-primary" onclick="confirmImport(false)">전체 교체</button>
    </div>
  </div>
</div>

<div id="print-area"></div>
<div id="toast"></div>

<script>
const STORAGE_KEY = 'device_rental_v2';

const defaultDevices = [
  // ── 대여 중 ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────

function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):defaultDevices.map(d=>({...d})); }
  catch { return defaultDevices.map(d=>({...d})); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(devices)); }

// ── 렌더링 ───────────────────────────────────────────────
const STATUS_BADGE = { 보유:'badge-avail', 대여:'badge-rented', 고장:'badge-broken', AS:'badge-as', 폐기:'badge-discard' };
const STATUS_PRINT = { 보유:'st-avail',   대여:'st-rented',   고장:'st-broken',   AS:'st-as',   폐기:'st-discard' };

function statusBadge(s) {
  return `<span class="badge ${STATUS_BADGE[s]||'badge-discard'}">${esc(s)}</span>`;
}

function renderTable() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const fOs = document.getElementById('filter-os').value;
  const fSt = document.getElementById('filter-status').value;

  let list = devices.filter(d =>
    (!q || d.name.toLowerCase().includes(q) || d.assetId.toLowerCase().includes(q) || d.renter.toLowerCase().includes(q) || d.model.toLowerCase().includes(q)) &&
    (!fOs || d.os===fOs) &&
    (!fSt || d.status===fSt)
  );

  if (sortKey) {
    list.sort((a,b) => {
      const va=(a[sortKey]||'').toLowerCase(), vb=(b[sortKey]||'').toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('table-body');
  if (!list.length) {
    tbody.innerHTML='<tr class="empty-row"><td colspan="16">검색 결과가 없습니다.</td></tr>';
    updateSummary(); return;
  }

  tbody.innerHTML = list.map(d => {
    const osCls = d.os==='Android'?'os-android':d.os==='iOS'?'os-ios':'os-other';
    let actionBtn = '';
    if      (d.status==='보유') actionBtn=`<button class="btn btn-rent"   onclick="openRentModal(${d.id})">대여</button>`;
    else if (d.status==='대여') actionBtn=`<button class="btn btn-return" onclick="openReturnModal(${d.id})">반납</button>`;
    const rdDisplay = d.returnDate && d.status==='대여' && d.returnDate<today()
      ? `<span style="color:#ea4335;font-weight:600">${esc(d.returnDate)} ⚠️</span>`
      : (d.returnDate||'<span style="color:#bbb">-</span>');
    return `<tr>
      <td>${esc(d.assetId)}</td>
      <td><strong>${esc(d.name)}</strong></td>
      <td>${esc(d.model)||'-'}</td>
      <td><span class="os-badge ${osCls}">${esc(d.os)}</span></td>
      <td>${esc(d.version)}</td>
      <td><span class="trunc" title="${esc(d.serial)}">${esc(d.serial)||'-'}</span></td>
      <td>${esc(d.resolution)||'-'}</td>
      <td>${esc(d.ram)||'-'}</td>
      <td><span class="trunc" title="${esc(d.chipset)}">${esc(d.chipset)||'-'}</span></td>
      <td>${statusBadge(d.status)}</td>
      <td>${esc(d.location)||'-'}</td>
      <td>${esc(d.renter)||'<span style="color:#bbb">-</span>'}</td>
      <td>${esc(d.rentDate)||'<span style="color:#bbb">-</span>'}</td>
      <td>${rdDisplay}</td>
      <td><span class="trunc" title="${esc(d.notes)}">${esc(d.notes)||'-'}</span></td>
      <td><div class="actions">
        ${actionBtn}
        <button class="btn btn-qr"  onclick="openQRModal(${d.id})">QR</button>
        <button class="btn-icon"    onclick="openEditModal(${d.id})" title="수정">✏️</button>
        <button class="btn-icon"    onclick="deleteDevice(${d.id})"  title="삭제">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
  updateSummary();
}

function updateSummary() {
  document.getElementById('sum-total').textContent   = devices.length;
  document.getElementById('sum-avail').textContent   = devices.filter(d=>d.status==='보유').length;
  document.getElementById('sum-rented').textContent  = devices.filter(d=>d.status==='대여').length;
  document.getElementById('sum-broken').textContent  = devices.filter(d=>d.status==='고장').length;
  document.getElementById('sum-as').textContent      = devices.filter(d=>d.status==='AS').length;
  document.getElementById('sum-discard').textContent = devices.filter(d=>d.status==='폐기').length;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 정렬 ─────────────────────────────────────────────────
function sortBy(key) {
  sortAsc = sortKey===key ? !sortAsc : true;
  sortKey = key;
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  const idx=['assetId','name','model','os','version','serial','resolution','ram','chipset','status','location','renter','rentDate','returnDate','notes'].indexOf(key);
  if(idx>=0) document.querySelectorAll('thead th')[idx].classList.add('sorted');
  renderTable();
}

// ── 추가/수정 ─────────────────────────────────────────────
function openAddModal() {
  editingId=null;
  document.getElementById('add-modal-title').textContent='단말기 추가';
  ['assetId','name','model','serial','version','resolution','ram','chipset','location','renter','notes'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-os').value='Android';
  document.getElementById('f-status').value='보유';
  document.getElementById('f-rentDate').value='';
  document.getElementById('f-returnDate').value='';
  toggleRentFields();
  openModal('add-modal');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function openEditModal(id) {
  const d=devices.find(x=>x.id===id); if(!d) return;
  editingId=id;
  document.getElementById('add-modal-title').textContent='단말기 수정';
  ['assetId','name','model','serial','version','resolution','ram','chipset','location','renter','rentDate','returnDate','notes'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.value=d[f]||'';
  });
  document.getElementById('f-os').value=d.os;
  document.getElementById('f-status').value=d.status;
  toggleRentFields();
  openModal('add-modal');
}

function toggleRentFields() {
  const st=document.getElementById('f-status').value;
  document.getElementById('rent-fields').style.display=(st==='보유'||st==='고장'||st==='폐기')?'none':'block';
}

function saveDevice() {
  const g=f=>document.getElementById('f-'+f).value.trim();
  if(!g('name')||!g('version')){toast('기기명과 버전을 입력해주세요.');return;}
  const data={
    assetId:g('assetId'),name:g('name'),model:g('model'),os:document.getElementById('f-os').value,
    version:g('version'),serial:g('serial'),resolution:g('resolution'),ram:g('ram'),chipset:g('chipset'),
    status:document.getElementById('f-status').value,location:g('location'),
    renter:g('renter'),rentDate:document.getElementById('f-rentDate').value,
    returnDate:document.getElementById('f-returnDate').value,notes:g('notes'),
  };
  if(editingId){ const d=devices.find(x=>x.id===editingId); if(d) Object.assign(d,data); toast('수정되었습니다.'); }
  else         { devices.push({id:nextId++,...data}); toast('단말기가 추가되었습니다.'); }
  save(); closeModal('add-modal'); renderTable();
}

function deleteDevice(id) {
  const d=devices.find(x=>x.id===id); if(!d) return;
  if(d.status==='대여'){toast('대여 중인 단말기는 삭제할 수 없습니다.');return;}
  if(!confirm(`"${d.name}"을(를) 삭제하시겠습니까?`)) return;
  devices=devices.filter(x=>x.id!==id); save(); renderTable(); toast('삭제되었습니다.');
}

// ── 대여 ─────────────────────────────────────────────────
function openRentModal(id) {
  actionId=id; const d=devices.find(x=>x.id===id);
  document.getElementById('rent-info-box').innerHTML=`
    <div class="ri-row"><span class="ri-label">기기명</span><span class="ri-value">${esc(d.name)}</span></div>
    <div class="ri-row"><span class="ri-label">모델</span><span class="ri-value">${esc(d.model)}</span></div>`;
  document.getElementById('rf-renter').value='';
  document.getElementById('rf-location').value='';
  document.getElementById('rf-rentDate').value=today();
  document.getElementById('rf-returnDate').value='';
  openModal('rent-modal');
  setTimeout(()=>document.getElementById('rf-renter').focus(),100);
}

function confirmRent() {
  const renter=document.getElementById('rf-renter').value.trim();
  const loc=document.getElementById('rf-location').value.trim();
  const rentDate=document.getElementById('rf-rentDate').value;
  const returnDate=document.getElementById('rf-returnDate').value;
  if(!renter||!rentDate){toast('대여자 이름과 대여일을 입력해주세요.');return;}
  if(returnDate&&returnDate<rentDate){toast('반납 예정일은 대여일 이후여야 합니다.');return;}
  const d=devices.find(x=>x.id===actionId);
  Object.assign(d,{status:'대여',renter,location:loc,rentDate,returnDate});
  save(); closeModal('rent-modal'); renderTable();
  toast(`"${d.name}" 대여 처리되었습니다.`);
}

// ── 반납 ─────────────────────────────────────────────────
function openReturnModal(id) {
  actionId=id; const d=devices.find(x=>x.id===id);
  document.getElementById('return-info-box').innerHTML=`
    <div class="ri-row"><span class="ri-label">기기명</span><span class="ri-value">${esc(d.name)}</span></div>
    <div class="ri-row"><span class="ri-label">대여자</span><span class="ri-value">${esc(d.renter)}</span></div>
    <div class="ri-row"><span class="ri-label">대여일</span><span class="ri-value">${esc(d.rentDate)}</span></div>
    <div class="ri-row"><span class="ri-label">반납 예정</span><span class="ri-value">${d.returnDate||'-'}</span></div>`;
  document.getElementById('ret-date').value=today();
  openModal('return-modal');
}

function confirmReturn() {
  const returnDate=document.getElementById('ret-date').value;
  if(!returnDate){toast('반납일을 입력해주세요.');return;}
  const d=devices.find(x=>x.id===actionId);
  Object.assign(d,{status:'보유',renter:'',location:'서랍 보관',returnDate});
  save(); closeModal('return-modal'); renderTable();
  toast(`"${d.name}" 반납 처리되었습니다.`);
}

// ── QR ───────────────────────────────────────────────────
function buildQRText(d) {
  const lines=[d.name,`${d.os} ${d.version}`];
  if(d.assetId&&d.assetId!=='-') lines.push(`ID: ${d.assetId}`);
  lines.push(d.status==='대여'?`Rented: ${d.renter}`:d.status==='보유'?'Available':d.status);
  if(d.rentDate)   lines.push(`From: ${d.rentDate}`);
  if(d.returnDate) lines.push(`Due:  ${d.returnDate}`);
  return lines.join('\n');
}

function openQRModal(id) {
  const d=devices.find(x=>x.id===id); if(!d) return;
  actionId=id;
  document.getElementById('qr-device-name').textContent   =d.name;
  document.getElementById('qr-assetId').textContent       =d.assetId||'-';
  document.getElementById('qr-model').textContent         =d.model||'-';
  document.getElementById('qr-info-os').textContent       =`${d.os} / ${d.version}`;
  document.getElementById('qr-info-renter').textContent   =d.renter||'-';
  document.getElementById('qr-info-location').textContent =d.location||'-';
  document.getElementById('qr-info-rentdate').textContent =d.rentDate||'-';
  document.getElementById('qr-info-status').innerHTML     =statusBadge(d.status);
  openModal('qr-modal');
  const container=document.getElementById('qr-canvas-container');
  container.innerHTML='';
  if(qrInstance){try{qrInstance.clear();}catch(e){} qrInstance=null;}
  if(typeof QRCode==='undefined'){
    container.innerHTML='<div style="font-size:11px;color:#ea4335;text-align:center;padding:12px;line-height:1.6;">QR 라이브러리 로드 실패<br>인터넷 연결 확인</div>';
    return;
  }
  try { qrInstance=new QRCode(container,{text:buildQRText(d),width:176,height:176,correctLevel:QRCode.CorrectLevel.L}); }
  catch(e){ container.innerHTML=`<div style="font-size:11px;color:#ea4335;text-align:center;padding:12px;">QR 오류: ${e.message}</div>`; }
}

function downloadQR() {
  const c=document.querySelector('#qr-canvas-container canvas');
  if(!c){toast('QR 이미지를 찾을 수 없습니다.');return;}
  const d=devices.find(x=>x.id===actionId);
  const a=document.createElement('a');
  a.download=`QR_${d?d.name.replace(/\s/g,'_'):'device'}.png`;
  a.href=c.toDataURL('image/png'); a.click(); toast('QR 이미지를 저장했습니다.');
}

function printSingleQR() {
  const c=document.querySelector('#qr-canvas-container canvas');
  if(!c){toast('QR 이미지를 찾을 수 없습니다.');return;}
  const d=devices.find(x=>x.id===actionId); if(!d) return;
  buildPrintArea([{device:d,imgSrc:c.toDataURL('image/png')}],true);
  window.print();
}

function printAllQR() {
  if(!devices.length){toast('등록된 단말기가 없습니다.');return;}
  if(typeof QRCode==='undefined'){toast('QR 라이브러리가 로드되지 않았습니다.');return;}
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:-9999px;visibility:hidden;';
  document.body.appendChild(wrap);
  const items=devices.map(d=>{
    const div=document.createElement('div'); wrap.appendChild(div);
    new QRCode(div,{text:buildQRText(d),width:160,height:160,correctLevel:QRCode.CorrectLevel.L});
    const c=div.querySelector('canvas');
    return {device:d,imgSrc:c?c.toDataURL('image/png'):''};
  });
  document.body.removeChild(wrap);
  buildPrintArea(items,false); window.print();
}

function buildPrintArea(items,isSingle) {
  const area=document.getElementById('print-area');
  const cards=items.map(({device:d,imgSrc})=>`
    <div class="qr-card">
      <img src="${imgSrc}" alt="QR">
      <div class="qc-name">${esc(d.name)}</div>
      <div class="qc-sub">${esc(d.assetId)} | ${esc(d.os)} ${esc(d.version)}</div>
      <div class="qc-status ${STATUS_PRINT[d.status]||'st-discard'}">${esc(d.status)}</div>
      ${d.renter?`<div class="qc-renter">${esc(d.renter)}</div>`:''}
    </div>`).join('');
  area.innerHTML=`<div class="print-title">단말기 QR 현황 — ${new Date().toLocaleDateString('ko-KR')}</div>
    <div class="print-grid${isSingle?' single':''}">${cards}</div>`;
  window.addEventListener('afterprint',()=>{area.innerHTML='';},{once:true});
}

// ── 유틸 ─────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el) closeModal(el.id);});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(el=>closeModal(el.id));
});

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── 엑셀 가져오기 ────────────────────────────────────────
let importRows = [];

function handleExcelFile(input) {
  const file = input.files[0]; if(!file) return;
  input.value = '';
  if(typeof XLSX === 'undefined'){toast('Excel 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.');return;}
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if(rows.length < 2){toast('데이터가 없습니다.');return;}
      const parsed = parseRows(rows);
      if(!parsed.length){toast('가져올 데이터가 없습니다.');return;}
      devices = parsed;
      nextId = Math.max(...devices.map(d=>d.id)) + 1;
      save(); renderTable();
      toast(`✅ ${devices.length}개 단말기를 가져왔습니다.`);
    } catch(err) { toast('파일 읽기 오류: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// 헤더 행을 찾아 컬럼 인덱스 매핑
function detectColumns(headerRow) {
  const map = {};
  headerRow.forEach((cell, i) => {
    const c = String(cell).trim();
    if(/자산|번호|asset|id/i.test(c) && !map.assetId)     map.assetId     = i;
    if(/기기명|기기|단말/i.test(c)   && !map.name)         map.name        = i;
    if(/모델/i.test(c)               && !map.model)        map.model       = i;
    if(/버전|os.*ver|version/i.test(c)&& !map.version)     map.version     = i;
    if(/시리얼|serial|s\/n/i.test(c) && !map.serial)       map.serial      = i;
    if(/해상도|resol/i.test(c)       && !map.resolution)   map.resolution  = i;
    if(/ram|메모리|memory/i.test(c)  && !map.ram)          map.ram         = i;
    if(/칩셋|chip|cpu|ap/i.test(c)   && !map.chipset)      map.chipset     = i;
    if(/대여자|사용자|renter/i.test(c)&& !map.renter)       map.renter      = i;
    if(/날짜|대여일|date/i.test(c)   && !map.rentDate)     map.rentDate    = i;
    if(/위치|장소|location/i.test(c) && !map.location)     map.location    = i;
    if(/비고|메모|note/i.test(c)     && !map.notes)        map.notes       = i;
  });
  // 헤더 미감지 시 위치 기반 기본값 (이미지 스프레드시트 컬럼 순서 기준)
  const def = [,'assetId','name','model','version','serial','resolution','ram','chipset','renter','rentDate','location','notes'];
  def.forEach((k,i)=>{ if(k && map[k]===undefined) map[k]=i; });
  return map;
}

function inferOS(name, model) {
  if(/iphone|ipad/i.test(name)) return 'iOS';
  if(/^(A\d{4}|MK|MG|MM|MQ)/i.test(model)) return 'iOS';
  return 'Android';
}

function inferStatus(location, renter, notes) {
  const loc = String(location).trim();
  const nt  = String(notes).trim();
  if(/폐기/i.test(loc)||/폐기/i.test(nt))           return '폐기';
  if(/고장/i.test(loc)||/고장/i.test(nt))           return '고장';
  if(/삼성.*지원|as센터|수리/i.test(loc))            return 'AS';
  if(String(renter).trim() && !/보관/i.test(loc))   return '대여';
  return '보유';
}

function parseDate(val) {
  if(!val) return '';
  const s = String(val).trim();
  // YY-M-D 또는 YY-MM-DD 형식
  const m = s.match(/^(\d{2})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `20${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // YYYY-MM-DD 이미 완전한 형식
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // 엑셀 날짜 숫자
  if(!isNaN(val) && Number(val) > 1000) {
    const d = XLSX.SSF.parse_date_code(Number(val));
    if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  return s;
}

function parseRows(rows) {
  // 첫 행이 헤더인지 확인 (첫 셀에 숫자가 아닌 텍스트면 헤더로 간주)
  let dataStart = 0;
  let colMap;
  if(isNaN(rows[0][0]) || /[가-힣a-zA-Z]/.test(String(rows[0][0]))) {
    colMap = detectColumns(rows[0]);
    dataStart = 1;
  } else {
    colMap = detectColumns([]);
  }

  const g = (row, key) => String(row[colMap[key]] ?? '').trim();

  return rows.slice(dataStart)
    .filter(row => row.some(c => String(c).trim()))
    .map((row, i) => {
      const assetId  = g(row,'assetId');
      const name     = g(row,'name');
      const model    = g(row,'model');
      const version  = g(row,'version');
      const serial   = g(row,'serial');
      const renter   = g(row,'renter');
      const location = g(row,'location');
      const notes    = g(row,'notes');
      return {
        id: nextId + i,
        assetId, name, model,
        os: inferOS(name, model),
        version, serial,
        resolution: g(row,'resolution'),
        ram:        g(row,'ram'),
        chipset:    g(row,'chipset'),
        status:     inferStatus(location, renter, notes),
        location, renter,
        rentDate:   parseDate(g(row,'rentDate')),
        returnDate: '',
        notes,
      };
    })
    .filter(d => d.name);  // 기기명 없는 행 제거
}

function showImportPreview(rows) {
  const parsed = parseRows(rows);
  importRows._parsed = parsed;

  document.getElementById('import-summary').innerHTML =
    `<strong>${parsed.length}개</strong> 단말기 감지됨 — ` +
    `보유 ${parsed.filter(d=>d.status==='보유').length} / ` +
    `대여 ${parsed.filter(d=>d.status==='대여').length} / ` +
    `고장 ${parsed.filter(d=>d.status==='고장').length} / ` +
    `AS ${parsed.filter(d=>d.status==='AS').length} / ` +
    `폐기 ${parsed.filter(d=>d.status==='폐기').length}`;

  document.getElementById('import-preview-head').innerHTML = `<tr>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">자산번호</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">기기명</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">모델</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">OS/버전</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">시리얼</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">상태</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">대여자</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">위치</th>
    <th style="padding:8px;border-bottom:1px solid #e0e0e0;white-space:nowrap;">비고</th>
  </tr>`;

  document.getElementById('import-preview-body').innerHTML = parsed.map(d => `
    <tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:7px 8px;">${esc(d.assetId)||'-'}</td>
      <td style="padding:7px 8px;"><strong>${esc(d.name)}</strong></td>
      <td style="padding:7px 8px;">${esc(d.model)||'-'}</td>
      <td style="padding:7px 8px;">${esc(d.os)} ${esc(d.version)}</td>
      <td style="padding:7px 8px;font-size:11px;">${esc(d.serial)||'-'}</td>
      <td style="padding:7px 8px;">${statusBadge(d.status)}</td>
      <td style="padding:7px 8px;">${esc(d.renter)||'-'}</td>
      <td style="padding:7px 8px;">${esc(d.location)||'-'}</td>
      <td style="padding:7px 8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(d.notes)}">${esc(d.notes)||'-'}</td>
    </tr>`).join('');

  openModal('import-modal');
}

function confirmImport(merge) {
  const parsed = importRows._parsed;
  if(!parsed||!parsed.length){closeModal('import-modal');return;}

  if(merge) {
    // 기존 데이터에 병합 (시리얼 기준으로 중복 제거)
    const existingSerials = new Set(devices.map(d=>d.serial).filter(Boolean));
    const toAdd = parsed.filter(d => !d.serial || !existingSerials.has(d.serial));
    toAdd.forEach((d,i)=>{ d.id = nextId+i; });
    nextId += toAdd.length;
    devices.push(...toAdd);
    toast(`${toAdd.length}개 추가되었습니다. (중복 ${parsed.length-toAdd.length}개 스킵)`);
  } else {
    devices = parsed;
    nextId = Math.max(...devices.map(d=>d.id)) + 1;
    toast(`${devices.length}개 단말기로 교체되었습니다.`);
  }

  save(); closeModal('import-modal'); renderTable();
}

renderTable();
